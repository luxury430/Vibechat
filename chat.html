<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neuro Forge — Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────────────────────────────────────
   THEME TOKENS — PREMIUM DARK
───────────────────────────────────────────────────────────── */
:root {
  --bg-app: #050511;
  --bg-sidebar: #09091e;
  --bg-chat: #070718;
  --bg-card: #0e0e28;
  --bg-input: #14143a;
  --bg-hover: rgba(139,92,246,.10);
  --bg-active: rgba(139,92,246,.20);
  --msg-sent: linear-gradient(145deg,#4c1d95 0%,#7c3aed 55%,#8b5cf6 100%);
  --msg-recv: #131330;
  --accent: #8b5cf6;
  --accent2: #c4b5fd;
  --accent3: #6d28d9;
  --gold: #f59e0b;
  --glow: rgba(139,92,246,.38);
  --glow2: rgba(139,92,246,.14);
  --tp: #ededff;
  --ts: #7070b4;
  --tm: #42426a;
  --border: rgba(139,92,246,.10);
  --border2: rgba(139,92,246,.22);
  --border3: rgba(255,255,255,.05);
  --shadow: 0 20px 70px rgba(0,0,0,.70);
  --shadow-s: 0 4px 18px rgba(0,0,0,.42);
  --shadow-glow: 0 8px 32px rgba(139,92,246,.22);
  --r-s:8px; --r-m:14px; --r-l:20px; --r-xl:28px; --r-f:9999px;
  --ease: cubic-bezier(.25,.46,.45,.94);
  --spring: cubic-bezier(.34,1.56,.64,1);
  --dur: .32s;
  --sw: 340px;
  --font-d:'Outfit',sans-serif;
  --font-b:'Plus Jakarta Sans',sans-serif;
}
[data-theme="light"] {
  --bg-app:#f0f0fc;
  --bg-sidebar:#ffffff;
  --bg-chat:#f4f4ff;
  --bg-card:#ffffff;
  --bg-input:#eaeaff;
  --bg-hover:rgba(100,80,248,.06);
  --bg-active:rgba(100,80,248,.13);
  --msg-recv:#ffffff;
  --tp:#0a0a20;
  --ts:#5555a8;
  --tm:#9999bb;
  --border:rgba(0,0,0,.07);
  --border2:rgba(0,0,0,.14);
  --border3:rgba(0,0,0,.05);
  --shadow:0 12px 48px rgba(90,70,200,.12);
  --shadow-s:0 3px 12px rgba(90,70,200,.09);
  --shadow-glow:0 6px 24px rgba(139,92,246,.15);
}

/* ─────────────────────────────────────────────────────────────
   RESET
───────────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;}
body{font-family:var(--font-b);background:var(--bg-app);color:var(--tp);height:100vh;width:100vw;overflow:hidden;transition:background var(--dur) var(--ease),color var(--dur) var(--ease);}



/* ── NO OUTLINE / TAP HIGHLIGHT on ALL interactive elements ── */
button,
[role="button"],
input,
textarea,
select,
.ci,
.fwd-ci,
.uid-badge,
.rp-pill,
.p-act-btn,
.head-act,
.theme-btn,
.settings-btn,
.back-btn,
.prof-close,
.send-btn,
.inp-btn,
.act-b,
.e-btn,
.e-cat,
.qr-b,
.m-close,
.fwd-submit,
.rp-close {
  outline: none;
  -webkit-tap-highlight-color: transparent;
}
button:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
}

button{cursor:pointer;font-family:var(--font-b);}
textarea{font-family:var(--font-b);}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:99px;opacity:.6;}

/* ─────────────────────────────────────────────────────────────
   LAYOUT
───────────────────────────────────────────────────────────── */
.app{display:flex;height:100vh;width:100vw;overflow:hidden;position:relative;}



/* ─────────────────────────────────────────────────────────────
   SIDEBAR
───────────────────────────────────────────────────────────── */
.sidebar{width:var(--sw);min-width:var(--sw);height:100%;background:var(--bg-sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:relative;z-index:100;transition:transform var(--dur) var(--ease),background var(--dur) var(--ease);}
.sidebar::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(139,92,246,.14),transparent);pointer-events:none;z-index:0;}
.sidebar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:120px;background:linear-gradient(to top,rgba(9,9,30,.9),transparent);pointer-events:none;z-index:0;}
.sidebar>*{position:relative;z-index:1;}

.s-head{padding:16px 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-d);font-size:1.35rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.4px;display:flex;align-items:center;gap:8px;}
.logo-node{width:22px;height:22px;background:linear-gradient(135deg,var(--accent3),var(--accent));border-radius:7px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px var(--glow);flex-shrink:0;}
.logo-node svg{width:13px;height:13px;fill:white;}

.head-icons{display:flex;align-items:center;gap:6px;}

.theme-btn,.settings-btn{width:34px;height:34px;border-radius:var(--r-f);border:1px solid var(--border2);background:var(--bg-card);color:var(--tp);display:flex;align-items:center;justify-content:center;font-size:.88rem;transition:all .22s var(--ease);}
.theme-btn:hover,.settings-btn:hover{background:var(--bg-hover);border-color:var(--accent);transform:scale(1.08);box-shadow:var(--shadow-glow);}
.settings-btn{color:var(--ts);}
.settings-btn:hover{color:var(--accent2);}

.s-search{padding:10px 12px;border-bottom:1px solid var(--border);}
.search-wrap{position:relative;display:flex;align-items:center;}
.search-ico{position:absolute;left:11px;font-size:.8rem;color:var(--tm);pointer-events:none;}
.search-inp{width:100%;padding:9px 12px 9px 34px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-f);color:var(--tp);font-size:.85rem;outline:none;transition:all .22s var(--ease);}
.search-inp::placeholder{color:var(--tm);}
.search-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow2);}

.s-label{padding:14px 16px 6px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--tm);}
.contacts{flex:1;overflow-y:auto;padding:4px 8px 60px;}

/* Contact Item */
.ci{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:var(--r-m);cursor:pointer;transition:background .18s var(--ease);position:relative;margin-bottom:1px;opacity:0;transform:translateX(-18px);animation:ciIn .38s var(--ease) forwards;}
@keyframes ciIn{to{opacity:1;transform:translateX(0);}}
.ci:hover{background:var(--bg-hover);}
.ci.active{background:var(--bg-active);}
.ci.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:55%;background:linear-gradient(to bottom,var(--accent2),var(--accent));border-radius:0 4px 4px 0;box-shadow:0 0 10px var(--glow);}
.ci.active .av{box-shadow:0 0 22px var(--glow);}

/* Avatar */
.av{border-radius:var(--r-f);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:700;color:#fff;flex-shrink:0;position:relative;letter-spacing:-.5px;}
.av-dot{position:absolute;bottom:1px;right:1px;border-radius:50%;border:2px solid var(--bg-sidebar);}
.s-on{background:#22c55e;} .s-aw{background:#f59e0b;} .s-off{background:var(--tm);}

.ci-info{flex:1;min-width:0;}
.ci-name{font-weight:600;font-size:.87rem;color:var(--tp);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:color var(--dur);}
.ci-last{font-size:.76rem;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;transition:color var(--dur);}
.ci-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.ci-time{font-size:.68rem;color:var(--tm);}
.unread{width:19px;height:19px;background:linear-gradient(135deg,var(--accent3),var(--accent));border-radius:50%;font-size:.62rem;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px var(--glow);}
.no-results{text-align:center;padding:32px 16px;color:var(--tm);font-size:.85rem;}

/* ─────────────────────────────────────────────────────────────
   CHAT AREA
───────────────────────────────────────────────────────────── */
.chat{flex:1;display:flex;flex-direction:column;height:100%;overflow:hidden;position:relative;background:var(--bg-chat);transition:background var(--dur) var(--ease);}
.chat::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 30% at 70% 10%,rgba(139,92,246,.05),transparent),radial-gradient(ellipse 40% 20% at 20% 80%,rgba(139,92,246,.04),transparent);pointer-events:none;z-index:0;}
.chat>*{position:relative;z-index:1;}

/* Empty */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;animation:fadeUp .6s var(--ease) both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.empty-ico{font-size:3.2rem;filter:drop-shadow(0 0 24px var(--glow));}
.empty-title{font-family:var(--font-d);font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.empty-sub{font-size:.85rem;color:var(--ts);max-width:260px;text-align:center;line-height:1.65;}

/* Chat Header */
.c-head{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;background:var(--bg-sidebar);cursor:pointer;transition:background .18s var(--ease);flex-shrink:0;position:relative;}
.c-head::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--accent),transparent);opacity:.3;}
.c-head:hover{background:var(--bg-hover);}
.back-btn{display:none;width:30px;height:30px;border-radius:50%;background:var(--bg-input);border:none;color:var(--tp);align-items:center;justify-content:center;font-size:.95rem;transition:all .18s;flex-shrink:0;}
.back-btn:hover{background:var(--bg-hover);}
.c-head-info{flex:1;min-width:0;}
.c-head-name{font-family:var(--font-d);font-weight:700;font-size:.98rem;color:var(--tp);}
.c-head-status{font-size:.72rem;color:var(--ts);margin-top:1px;}
.head-acts{display:flex;gap:7px;align-items:center;}
.head-act{width:34px;height:34px;border-radius:var(--r-f);border:1px solid var(--border);background:var(--bg-card);color:var(--ts);display:flex;align-items:center;justify-content:center;font-size:.85rem;transition:all .18s;}
.head-act:hover{color:var(--accent);border-color:var(--accent);background:var(--bg-hover);box-shadow:var(--shadow-glow);}

/* Messages */
.msgs{flex:1;overflow-y:auto;padding:18px 18px 10px;display:flex;flex-direction:column;gap:3px;scroll-behavior:smooth;}


.date-div{display:flex;align-items:center;gap:10px;margin:10px 0;}
.date-div::before,.date-div::after{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--border2),transparent);}
.date-div-txt{font-size:.67rem;color:var(--tm);font-weight:600;letter-spacing:.5px;white-space:nowrap;}

.mw{display:flex;align-items:flex-end;gap:7px;position:relative;}
.mw.sent{flex-direction:row-reverse;}
.mw.sent .m-av{display:none;}
.m-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff;flex-shrink:0;align-self:flex-end;}

.mbw{display:flex;flex-direction:column;max-width:68%;gap:2px;position:relative;}
.mw.sent .mbw{align-items:flex-end;}

/* Message actions */
.m-acts{position:absolute;bottom:calc(100% + 6px);display:none;gap:2px;background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-f);padding:4px 7px;box-shadow:var(--shadow-s);z-index:30;white-space:nowrap;animation:popIn .18s var(--spring) both;}
@keyframes popIn{from{opacity:0;transform:scale(.82);}to{opacity:1;transform:scale(1);}}
.mw.sent .m-acts{right:0;}
.mw.received .m-acts{left:0;}
.mw:hover .m-acts{display:flex;}

.act-b{width:26px;height:26px;border-radius:50%;border:none;background:transparent;font-size:.78rem;display:flex;align-items:center;justify-content:center;color:var(--ts);transition:all .15s;}
.act-b:hover{background:var(--bg-hover);color:var(--accent);transform:scale(1.18);}
.act-b.del:hover{background:rgba(239,68,68,.12);color:#ef4444;}

.fwd-badge{font-size:.68rem;color:var(--tm);display:flex;align-items:center;gap:3px;margin-bottom:2px;}
.rp-prev{background:var(--bg-input);border-left:3px solid var(--accent);padding:5px 9px;border-radius:var(--r-s);font-size:.73rem;color:var(--ts);margin-bottom:3px;}
.rp-prev-name{font-weight:700;color:var(--accent);font-size:.68rem;margin-bottom:1px;}
.mb{padding:10px 14px;border-radius:var(--r-l);font-size:.855rem;line-height:1.55;word-break:break-word;transition:all .18s;animation:msgPop .3s var(--spring) both;}
@keyframes msgPop{from{opacity:0;transform:scale(.78) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mw.sent .mb{background:var(--msg-sent);color:#fff;border-bottom-right-radius:6px;box-shadow:0 4px 20px rgba(139,92,246,.3);}
.mw.received .mb{background:var(--msg-recv);color:var(--tp);border-bottom-left-radius:6px;border:1px solid var(--border2);}
.m-reactions{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px;}
.rp-pill{background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r-f);padding:2px 8px;font-size:.72rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:3px;color:var(--ts);}
.rp-pill:hover{border-color:var(--accent);background:var(--bg-hover);}
.m-time{font-size:.64rem;color:var(--tm);padding:0 3px;}

/* ─────────────────────────────────────────────────────────────
   INPUT
───────────────────────────────────────────────────────────── */
.inp-area{padding:10px 14px 14px;border-top:1px solid var(--border);background:var(--bg-sidebar);flex-shrink:0;transition:background var(--dur);}
.rp-bar{display:none;align-items:center;gap:9px;padding:7px 11px;background:var(--bg-input);border-radius:var(--r-m);margin-bottom:8px;border-left:3px solid var(--accent);animation:popIn .2s var(--spring) both;}
.rp-bar.show{display:flex;}
.rp-bar-c{flex:1;min-width:0;}
.rp-bar-n{font-size:.68rem;font-weight:700;color:var(--accent);}
.rp-bar-t{font-size:.76rem;color:var(--ts);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rp-close{background:none;border:none;color:var(--tm);font-size:.9rem;padding:2px;transition:color .15s;}
.rp-close:hover{color:var(--tp);}
.inp-row{display:flex;align-items:flex-end;gap:9px;}
.inp-btn{width:38px;height:38px;border-radius:var(--r-f);border:1px solid var(--border2);background:var(--bg-card);color:var(--ts);display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .18s;flex-shrink:0;}
.inp-btn:hover{color:var(--accent2);border-color:var(--accent);background:var(--bg-hover);transform:scale(1.06);box-shadow:var(--shadow-glow);}
.msg-inp{flex:1;background:var(--bg-input);border:1px solid var(--border2);border-radius:var(--r-l);padding:9px 15px;color:var(--tp);font-size:.855rem;outline:none;resize:none;max-height:110px;line-height:1.5;transition:all .2s;}
.msg-inp::placeholder{color:var(--tm);}
.msg-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow2);}
.send-btn{width:38px;height:38px;border-radius:var(--r-f);border:none;background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all .2s;flex-shrink:0;box-shadow:0 4px 18px var(--glow);}
.send-btn:hover{transform:scale(1.1) rotate(15deg);box-shadow:0 6px 26px var(--glow);}
.send-btn:active{transform:scale(.93);}

/* ─────────────────────────────────────────────────────────────
   EMOJI PICKER
───────────────────────────────────────────────────────────── */
.e-picker{position:absolute;bottom:72px;left:14px;background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-l);padding:11px;width:292px;box-shadow:var(--shadow);z-index:200;display:none;flex-direction:column;gap:8px;}
.e-picker.show{display:flex;animation:popIn .22s var(--spring) both;}
.e-cats{display:flex;gap:3px;border-bottom:1px solid var(--border);padding-bottom:7px;}
.e-cat{padding:4px 7px;border-radius:var(--r-s);border:none;background:transparent;font-size:.95rem;transition:background .15s;}
.e-cat:hover,.e-cat.on{background:var(--bg-hover);}
.e-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:2px;max-height:170px;overflow-y:auto;}
.e-btn{width:30px;height:30px;border:none;background:transparent;font-size:1.1rem;border-radius:var(--r-s);transition:all .15s;display:flex;align-items:center;justify-content:center;}
.e-btn:hover{background:var(--bg-hover);transform:scale(1.32);}

/* Quick Reactions */
.qr{position:fixed;background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-f);padding:5px 9px;display:none;gap:3px;box-shadow:var(--shadow);z-index:400;}
.qr.show{display:flex;animation:popIn .18s var(--spring) both;}
.qr-b{font-size:1.15rem;border:none;background:none;padding:2px;transition:transform .15s;}
.qr-b:hover{transform:scale(1.45);}

/* ─────────────────────────────────────────────────────────────
   PROFILE OVERLAY
───────────────────────────────────────────────────────────── */
.prof-ov{position:absolute;inset:0;background:var(--bg-chat);z-index:500;display:flex;flex-direction:column;transform:translateX(100%) scale(.97);opacity:0;pointer-events:none;overflow-y:auto;overflow-x:hidden;transition:transform .44s var(--ease),opacity .44s var(--ease);}
.prof-ov.open{transform:translateX(0) scale(1);opacity:1;pointer-events:all;}

.prof-hdr{min-height:230px;position:relative;display:flex;align-items:flex-end;padding:22px;flex-shrink:0;}
.prof-close{position:absolute;top:14px;left:14px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.32);border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .18s;backdrop-filter:blur(10px);}
.prof-close:hover{background:rgba(0,0,0,.55);transform:scale(1.1);}
.prof-av-lg{width:86px;height:86px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:1.9rem;color:#fff;border:3px solid rgba(255,255,255,.28);box-shadow:0 8px 36px rgba(0,0,0,.35);flex-shrink:0;}
.prof-hdr-info{margin-left:18px;}
.prof-name{font-family:var(--font-d);font-size:1.55rem;font-weight:800;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,.35);line-height:1.2;}
.prof-role{font-size:.82rem;color:rgba(255,255,255,.72);margin-top:3px;}
.prof-sb{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(255,255,255,.14);backdrop-filter:blur(10px);padding:4px 11px;border-radius:var(--r-f);font-size:.72rem;color:#fff;}
.prof-sd{width:6px;height:6px;border-radius:50%;}

.prof-body{flex:1;padding:20px;display:flex;flex-direction:column;gap:14px;}
.p-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.p-act-btn{padding:12px;border-radius:var(--r-m);border:1px solid var(--border);background:var(--bg-card);color:var(--tp);display:flex;flex-direction:column;align-items:center;gap:5px;font-size:.75rem;font-weight:600;transition:all .18s;}
.p-act-btn:hover{background:var(--bg-hover);border-color:var(--accent);color:var(--accent2);box-shadow:var(--shadow-glow);}
.p-act-ico{font-size:1.1rem;}

.p-card{background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-l);overflow:hidden;box-shadow:var(--shadow-s);}
.p-card-title{padding:11px 15px;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--tm);border-bottom:1px solid var(--border);}
.p-field{padding:13px 15px;display:flex;align-items:center;gap:13px;border-bottom:1px solid var(--border);transition:background .15s;}
.p-field:last-child{border-bottom:none;}
.p-field:hover{background:var(--bg-hover);}
.p-fic{width:34px;height:34px;border-radius:var(--r-s);background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;border:1px solid var(--border);}
.p-fc{flex:1;}
.p-fl{font-size:.67rem;color:var(--tm);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.p-fv{font-size:.88rem;color:var(--tp);font-weight:500;margin-top:2px;}
.uid-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg-hover);border:1px solid var(--border2);border-radius:var(--r-s);padding:3px 9px;font-family:'Courier New',monospace;font-size:.8rem;color:var(--accent2);cursor:pointer;transition:all .18s;}

/* ─────────────────────────────────────────────────────────────

───────────────────────────────────────────────────────────── */
.settings-ov{position:fixed;inset:0;z-index:900;display:flex;pointer-events:none;}

.settings-panel{position:relative;width:360px;max-width:90vw;height:100%;background:var(--bg-sidebar);border-right:1px solid var(--border2);display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .42s var(--ease);overflow:hidden;box-shadow:var(--shadow);}
.settings-panel::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(139,92,246,.16),transparent);pointer-events:none;}
.settings-ov.open{pointer-events:all;}
.settings-ov.open .settings-backdrop{opacity:1;}
.settings-ov.open .settings-panel{transform:translateX(0);}

.settings-hdr{padding:18px 18px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:relative;flex-shrink:0;}

.settings-close{width:32px;height:32px;border-radius:50%;border:1px solid var(--border2);background:var(--bg-card);color:var(--ts);display:flex;align-items:center;justify-content:center;font-size:.9rem;transition:all .18s;}
.settings-close:hover{color:var(--tp);background:var(--bg-hover);}

.settings-body{flex:1;overflow-y:auto;padding:18px;}

/* Avatar editor */
.sv-av-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:18px 0 22px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.sv-av{width:88px;height:88px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-weight:800;font-size:2rem;color:#fff;border:3px solid rgba(255,255,255,.2);box-shadow:0 8px 32px rgba(0,0,0,.4),0 0 0 4px var(--glow2);position:relative;cursor:pointer;transition:all .22s;}
.sv-av:hover{transform:scale(1.06);box-shadow:0 10px 40px rgba(0,0,0,.5),0 0 0 6px var(--glow2);}
.sv-av-edit{position:absolute;bottom:0;right:0;width:26px;height:26px;background:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.65rem;border:2px solid var(--bg-sidebar);}
.sv-name-disp{font-family:var(--font-d);font-size:1.1rem;font-weight:700;color:var(--tp);text-align:center;}
.sv-role-disp{font-size:.78rem;color:var(--ts);text-align:center;}

/* Color picker row */
.sv-colors{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:4px;}
.sv-col{width:24px;height:24px;border-radius:50%;cursor:pointer;transition:all .18s;border:2px solid transparent;}
.sv-col:hover{transform:scale(1.22);}
.sv-col.active{border-color:#fff;box-shadow:0 0 0 2px var(--accent);}

/* Form fields */
.sv-section{margin-bottom:18px;}
.sv-section-title{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--tm);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.sv-field{margin-bottom:12px;}
.sv-label{font-size:.7rem;font-weight:600;color:var(--ts);text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px;display:block;}
.sv-input{width:100%;padding:9px 13px;background:var(--bg-input);border:1px solid var(--border2);border-radius:var(--r-m);color:var(--tp);font-size:.875rem;font-family:var(--font-b);outline:none;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.sv-input::placeholder{color:var(--tm);}
.sv-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow2);}
.sv-textarea{resize:vertical;min-height:72px;line-height:1.55;}
.sv-uid{font-family:'Courier New',monospace;color:var(--accent2);font-size:.8rem;}

.sv-save{width:100%;padding:13px;border-radius:var(--r-m);border:none;background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;font-size:.9rem;font-weight:700;font-family:var(--font-b);letter-spacing:.3px;transition:all .22s;box-shadow:0 6px 22px var(--glow);margin-top:6px;}
.sv-save:hover{transform:translateY(-2px);box-shadow:0 10px 30px var(--glow);}
.sv-save:active{transform:translateY(0) scale(.97);}

.sv-badge-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.sv-badge{display:inline-flex;align-items:center;gap:5px;background:var(--bg-hover);border:1px solid var(--border2);border-radius:var(--r-s);padding:3px 10px;font-family:'Courier New',monospace;font-size:.78rem;color:var(--accent2);}

/* ─────────────────────────────────────────────────────────────
   FORWARD MODAL
───────────────────────────────────────────────────────────── */
.m-ov{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;padding:18px;}
.m-ov.show{display:flex;animation:fadeOv .2s ease;}
@keyframes fadeOv{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-xl);width:100%;max-width:390px;padding:22px;box-shadow:var(--shadow),0 0 0 1px var(--border);animation:modalUp .34s var(--spring) both;}
@keyframes modalUp{from{opacity:0;transform:translateY(28px) scale(.94);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal-ttl{font-family:var(--font-d);font-size:1.08rem;font-weight:700;color:var(--tp);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.m-close{background:none;border:none;color:var(--tm);font-size:1.15rem;transition:color .15s;}
.m-close:hover{color:var(--tp);}
.fwd-list{display:flex;flex-direction:column;gap:3px;max-height:290px;overflow-y:auto;}
.fwd-ci{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:var(--r-m);cursor:pointer;transition:all .15s;}
.fwd-ci:hover{background:var(--bg-hover);}
.fwd-ci.sel{background:var(--bg-active);}
.fwd-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);margin-left:auto;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;font-size:.68rem;}
.fwd-ci.sel .fwd-chk{background:var(--accent);border-color:var(--accent);color:#fff;}
.fwd-submit{width:100%;margin-top:14px;padding:13px;border-radius:var(--r-m);border:none;background:linear-gradient(135deg,var(--accent3),var(--accent));color:#fff;font-size:.9rem;font-weight:700;font-family:var(--font-b);transition:all .18s;box-shadow:0 4px 16px var(--glow);}
.fwd-submit:hover{opacity:.9;transform:translateY(-1px);}

/* ─────────────────────────────────────────────────────────────
   TOAST
───────────────────────────────────────────────────────────── */
.toast-c{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:7px;pointer-events:none;}
.toast{background:var(--bg-card);border:1px solid var(--border2);border-radius:var(--r-f);padding:9px 20px;font-size:.83rem;color:var(--tp);box-shadow:var(--shadow),0 0 0 1px rgba(139,92,246,.1);white-space:nowrap;animation:tIn .3s var(--spring) both;}
.toast.out{animation:tOut .25s var(--ease) forwards;}
@keyframes tIn{from{opacity:0;transform:translateY(-18px) scale(.9);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes tOut{to{opacity:0;transform:translateY(-8px) scale(.95);}}

/* ─────────────────────────────────────────────────────────────
   CHAT VIEW STATES
───────────────────────────────────────────────────────────── */
.chat-view{display:none;flex-direction:column;height:100%;overflow:hidden;}

.chat-view.on{display:flex;}

/* ─────────────────────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────────────────────── */
@media(max-width:768px){
  :root{--sw:100%;}
  .sidebar{position:absolute;inset:0;width:100%;z-index:100;transform:translateX(0);transition:transform var(--dur) var(--ease);}
  .sidebar.hide{transform:translateX(-100%);}
  .chat{position:absolute;inset:0;transform:translateX(100%);z-index:90;transition:transform var(--dur) var(--ease);}
  .chat.show{transform:translateX(0);}
  .back-btn{display:flex !important;}
  .e-picker{left:50%;transform:translateX(-50%);bottom:68px;width:calc(100% - 28px);max-width:320px;}
  .e-picker.show{display:flex;}
  .prof-ov{width:100%;}
  .settings-panel{width:100%;max-width:100%;}
}

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
import { updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  getDocs,
  addDoc,
  deleteDoc,
  collection,
  query,
  where,
  onSnapshot,
  orderBy
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// YOUR FULL JS CODE HERE ↓↓↓


/* ─────────────────────────────────────────────────────────────
   FIREBASE CONFIG & INIT
───────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyC4VFRg8moM-39BO0CPZgOg94gD3T1ED5k",
  authDomain: "neuros-52cda.firebaseapp.com",
  projectId: "neuros-52cda",
  storageBucket: "neuros-52cda.firebasestorage.app",
  messagingSenderId: "817588719752",
  appId: "1:817588719752:web:f206aabf4e908d99d90f3d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app); // global
async function searchUsers(searchText) {
  const q = query(collection(db, "users"));
  const snapshot = await getDocs(q);

  const results = [];

  snapshot.forEach(docSnap => {
    const data = docSnap.data();

    if (
      data.name?.toLowerCase().includes(searchText.toLowerCase()) ||
      data.uid?.toLowerCase().includes(searchText.toLowerCase())
    ) {
      results.push({ id: docSnap.id, ...data });
    }
  });

  return results;
}
/* ─────────────────────────────────────────
   AUTH FUNCTIONS
───────────────────────────────────────── */

async function signup(email, password, name) {
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);

    const safeName = name?.trim() || "User";

    await setDoc(doc(db, "users", cred.user.uid), {
      name: safeName.toLowerCase(),
      email,
      uid: "NF-" + cred.user.uid.slice(0,8).toUpperCase(),
      ini: safeName.slice(0, 2).toUpperCase(),
      g: 'linear-gradient(140deg,#7c3aed,#8b5cf6)',
      online: true,
      lastSeen: Date.now()
    });

    console.log("Signup success 🔥");

  } catch (error) {
    console.error("Signup error:", error);
    alert(error.message);
  }
}

async function login(email, password) {
  try {
    await signInWithEmailAndPassword(auth, email, password);
    console.log("Login success 🔥");
  } catch (error) {
    console.error("Login error:", error);
    alert(error.message);
  }
}

function logout() {
  signOut(auth)
    .then(() => console.log("Logged out ✅"))
    .catch(err => console.error("Logout error:", err));
}


/* ─────────────────────────────────────────────────────────────
   STATE & VARIABLES
───────────────────────────────────────────────────────────── */
let currentUser = null;
let ME = null; // My user profile
let contactsMap = new Map(); // Dynamic contacts loaded from Firestore
let curChatId = null;
let curOtherUser = null;
let unsubMessages = null;

let isDark = true;
let replyMsg = null;
let eCat = '😊';

/* ─────────────────────────────────────────────────────────────
   UTILS
───────────────────────────────────────────────────────────── */
const $ = id => document.getElementById(id);
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function genUID() {
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='NF-';
  for(let i=0;i<3;i++) s+=chars[Math.random()*chars.length|0];
  s+='-';
  for(let i=0;i<4;i++) s+=chars[Math.random()*chars.length|0];
  return s;
}

function toast(msg){
  const d = document.createElement('div');
  d.className = 'toast'; d.textContent = msg;
  $('toastC').appendChild(d);
  setTimeout(()=>{ d.classList.add('out'); setTimeout(()=>d.remove(),260); }, 2400);
}

function formatTime(ms) {
  return new Date(ms).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

/* ─────────────────────────────────────────────────────────────
   AUTH & USER MANAGEMENT
───────────────────────────────────────────────────────────── */



async function loadMyProfile() {
  const snap = await getDoc(doc(db, "users", currentUser.uid));

  if (snap.exists()) {
    ME = snap.data();
    ME.g = ME.g || 'linear-gradient(140deg,#7c3aed,#8b5cf6)';
    ME.ini = ME.ini || 'ME';
  } else {
    ME = {
      name: "New User",
      email: currentUser.email,
      uid: genUID(),
      ini: "NU",
      g: 'linear-gradient(140deg,#7c3aed,#8b5cf6)'
    };
    await setDoc(doc(db, "users", currentUser.uid), ME);
  }

  // Fill UI safely
const setVal = (id, val) => {
  const el = $(id);
  if (el) el.value = val || '';
};

const setTxt = (id, val) => {
  const el = $(id);
  if (el) el.textContent = val || '';
};

setVal('svName', ME.name);
setVal('svUsername', ME.username);
setVal('svHandle', ME.handle);
setVal('svIni', ME.ini);
setVal('svRole', ME.role);
setVal('svBio', ME.bio);
setVal('svDesc', ME.desc);

setTxt('svNameDisp', ME.name || 'Your Name');
setTxt('svRoleDisp', ME.role || 'Your Role');
setTxt('svAvIni', ME.ini || 'U');
}
async function setOnlineStatus(isOnline) {
  if(!currentUser) return;
  await setDoc(doc(db, "users", currentUser.uid), {
    online: isOnline,
    lastSeen: Date.now()
  }, { merge: true });
}

// Ensure user goes offline when leaving
window.addEventListener("beforeunload", () => {
  if(currentUser) setOnlineStatus(false);
});

/* ─────────────────────────────────────────────────────────────
   FIRESTORE: LOAD CONTACTS
───────────────────────────────────────────────────────────── */
function listenToChats() {
  const q = query(
    collection(db, "chats"),
    where("users", "array-contains", currentUser.uid),
    orderBy("updatedAt", "desc")
  );

  onSnapshot(q, async (snapshot) => {
    contactsMap.clear();

    for (const docSnap of snapshot.docs) {
      const chat = docSnap.data();
      const otherId = chat.users.find(u => u !== currentUser.uid);

      const userSnap = await getDoc(doc(db, "users", otherId));
      if (!userSnap.exists()) continue;

      const user = userSnap.data();

      contactsMap.set(otherId, {
        id: otherId,
        ...user,
        lastMsg: chat.lastMsg || ""
      });
    }

    renderContacts();
  });
}

function filtered() {
  const q = $('searchInp').value.trim().toLowerCase();
  const arr = Array.from(contactsMap.values());
  if(!q) return arr;
  return arr.filter(c => 
    (c.name && c.name.toLowerCase().includes(q)) || 
    (c.uid && c.uid.toLowerCase().includes(q))
  );
}

function renderContacts(data) {
  const list = $('contactsList');
  const arr = data || Array.from(contactsMap.values());

  if(!arr.length) {
    list.innerHTML = '<div class="no-results">No results found</div>';
    return;
  }

  list.innerHTML = '';

  arr.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'ci' + (c.id === curOtherUser?.id ? ' active' : '');
    el.style.animationDelay = (i * .048) + 's';

    const statusClass = c.online ? 's-on' : 's-off';

    el.innerHTML = `
      <div class="av" style="background:${c.g || '#333'};width:46px;height:46px;">
        ${c.ini || 'U'}
        <div class="av-dot ${statusClass}" style="width:11px;height:11px;"></div>
      </div>

      <div class="ci-info">
        <div class="ci-name">${c.name || c.username || c.handle || 'Unknown User'}</div>
        <div class="ci-last">
          ${c.online 
  ? "Online" 
  : (c.lastSeen ? new Date(c.lastSeen).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : "Offline")
}
        </div>
      </div>
    `;

    el.addEventListener('click', () => openChat(c));
    list.appendChild(el);
  });
}
async function findUserByUID(uid) {
  const q = query(collection(db, "users"), where("uid", "==", uid));
  const snap = await getDocs(q);

  if (snap.empty) {
    alert("User not found ❌");
    return null;
  }

  const docSnap = snap.docs[0];
  return { id: docSnap.id, ...docSnap.data() };
}
async function connectByUID() {
  const uid = document.getElementById("uidInput").value.trim();
  if (!uid) return;

  const user = await findUserByUID(uid);
  if (!user) return;

  openChat(user);
}
/* ─────────────────────────────────────────────────────────────
   FIRESTORE: START / OPEN CHAT
───────────────────────────────────────────────────────────── */
async function openChat(otherUser) {
  curOtherUser = otherUser;
  
  // Create consistent Chat ID by sorting UIDs
  curChatId = [currentUser.uid, otherUser.id].sort().join("_");

  // Ensure chat document exists
  await setDoc(doc(db, "chats", curChatId), {
    users: [currentUser.uid, otherUser.id],
    updatedAt: Date.now()
  }, { merge: true });

  // Update Header UI
  $('headAv').style.background = otherUser.g || '#333'; 
  $('headAv').textContent = otherUser.ini || 'U';
  $('headName').textContent = otherUser.name;
  $('headStatus').textContent = otherUser.online ? "Active now" : "Offline";

  $('emptyState').style.display = 'none';
  $('chatView').classList.add('on');

  if(window.innerWidth <= 768){
    $('sidebar').classList.add('hide');
    $('chat').classList.add('show');
  }

  cancelReply();
  listenMessages(); // Stream live messages
}

/* ─────────────────────────────────────────────────────────────
   FIRESTORE: MESSAGES (READ & WRITE)
───────────────────────────────────────────────────────────── */
async function sendMsg() {
  const inp = $('msgInp');
  const txt = inp.value.trim();

  if(!txt || !curChatId || !currentUser) return;

  const msgData = {
    text: txt,
    sender: currentUser.uid,
    time: Date.now(),
    rp: replyMsg ? { id: replyMsg.id, text: replyMsg.text } : null,
    fwd: false
  };

  // 🔥 1. Save message
  await addDoc(collection(db, "messages", curChatId, "msgs"), msgData);

  // 🔥 2. Update chat preview (VERY IMPORTANT)
  await setDoc(doc(db, "chats", curChatId), {
    lastMsg: txt,
    updatedAt: Date.now()
  }, { merge: true });

  inp.value = '';
  inp.style.height = 'auto';
  cancelReply();
}

function listenMessages() {
  if (unsubMessages) unsubMessages(); // Kill old listener when switching chats

  const q = query(
    collection(db, "messages", curChatId, "msgs"),
    orderBy("time", "asc")
  );

  unsubMessages = onSnapshot(q, snapshot => {
    const box = $('msgs');
    box.innerHTML = '<div class="date-div"><span class="date-div-txt">Today</span></div>';

    snapshot.forEach(docSnap => {
      const m = { id: docSnap.id, ...docSnap.data() };
      // Map to UI friendly variables
      m.s = (m.sender === currentUser.uid); // true if sent by me
      m.formattedTime = formatTime(m.time);
      appendMsg(box, m, curOtherUser);
    });
    box.scrollTop = box.scrollHeight;
  });
}

function appendMsg(box, m, c) {
  const w = document.createElement('div');
  w.className = 'mw ' + (m.s ? 'sent' : 'received');
  w.dataset.mid = m.id;

  let rpH = '';
  if(m.rp){
    rpH = `<div class="rp-prev"><div class="rp-prev-name">Replied</div>${esc(m.rp.text).slice(0,60)}</div>`;
  }

  const fwdH = m.fwd ? '<div class="fwd-badge">↪ Forwarded</div>' : '';

  w.innerHTML = `
    ${!m.s ? `<div class="m-av" style="background:${c.g||'#333'};width:26px;height:26px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;">${c.ini||'U'}</div>` : ''}
    <div class="mbw">
      <div class="m-acts">
        <button class="act-b" onclick="doReply('${m.id}', \`${esc(m.text)}\`)" title="Reply">↩</button>
        ${m.s ? `<button class="act-b del" onclick="delMsg('${m.id}')" title="Delete">🗑</button>` : ''}
      </div>
      ${fwdH}${rpH}
      ${m.img 
  ? `<img src="${m.img}" class="chat-img" style="max-width:200px;border-radius:10px;">`
  : `<div class="mb">${esc(m.text)}</div>`
}
      <div class="m-time">${m.formattedTime}</div>
    </div>`;
  box.appendChild(w);
}

/* ─────────────────────────────────────────────────────────────
   FIRESTORE: DELETE MESSAGE
───────────────────────────────────────────────────────────── */
async function delMsg(msgId) {
  try {
    await deleteDoc(doc(db, "messages", curChatId, "msgs", msgId));
    toast('Message deleted');
  } catch(e) {
    console.error("Error deleting msg:", e);
  }
}

/* ─────────────────────────────────────────────────────────────
   UI ACTIONS (REPLY, EMOJI, THEME)
───────────────────────────────────────────────────────────── */
window.doReply = function(id, text) {
  replyMsg = { id, text };
  $('rpBar').classList.add('show');
  $('rpName').textContent = "Reply";
  $('rpText').textContent = text;
  $('msgInp').focus();
}

function cancelReply() {
  replyMsg = null;
  $('rpBar').classList.remove('show');
}

function autoResize(el) { 
  el.style.height = 'auto'; 
  el.style.height = Math.min(el.scrollHeight, 110) + 'px'; 
}

function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  $('themeBtn').textContent = isDark ? '🌙' : '☀️';
}

/* ─────────────────────────────────────────────────────────────
   INIT APP
───────────────────────────────────────────────────────────── */
function init() {
if ($('searchInp')) {
  $('searchInp').addEventListener('input', async (e) => {
    const text = e.target.value.trim();

    try {
      if (!text) {
        renderContacts(filtered());
        return;
      }

      const results = await searchUsers(text);
      renderContacts(results);
    } catch (err) {
      console.error('Search error:', err);
      renderContacts(filtered());
    }
  });
}
const safeClick = (id, fn) => {
  const el = $(id);
  if (el) el.onclick = fn;
};
safeClick('settingsBtn', () => {
  console.log("Settings open");
  $('settingsOv')?.classList.add('open');
});

safeClick('settingsClose', () => {
  $('settingsOv')?.classList.remove('open');
});

safeClick('settingsBackdrop', () => {
  $('settingsOv')?.classList.remove('open');
});
// Open Profile Overlay
safeClick('infoBtn', () => {
  if (!curOtherUser) return;

  // 1. Fill in the user's details dynamically
  $('profName').textContent = curOtherUser.name || 'Unknown User';
  $('profRole').textContent = curOtherUser.role || 'No role provided';
  $('pfName').textContent = curOtherUser.name || '—';
  $('pfEmail').textContent = curOtherUser.email || '—';
  $('pfUser').textContent = curOtherUser.username || '—';
  $('pfHandle').textContent = curOtherUser.handle || '—';
  $('pfUid').textContent = curOtherUser.uid || '—';

  // 2. Set Avatar & Colors
  $('profAvLg').textContent = curOtherUser.ini || 'U';
  $('profAvLg').style.background = curOtherUser.g || '#333';

  // 3. Set Online/Offline Status
  $('profSdot').className = 'prof-sd ' + (curOtherUser.online ? 's-on' : 's-off');
  $('profStext').textContent = curOtherUser.online ? 'Online' : 'Offline';

  // 4. Slide the overlay in
  $('profOv').classList.add('open');
});

// Close Profile Overlay
safeClick('profClose', () => {
  $('profOv').classList.remove('open');
});

  $('themeBtn').onclick = toggleTheme;
$('connectBtn').onclick = connectByUID;
  
  
if ($('imgInput')) {
  $('imgInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) sendImage(file);
  });
}
  $('sendBtn').onclick = sendMsg;
  $('msgInp').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { 
      e.preventDefault(); 
      sendMsg(); 
    }
  });
  $('msgInp').addEventListener('input', e => autoResize(e.target));

  $('rpClose').onclick = cancelReply;

  $('backBtn').onclick = () => {
    $('sidebar').classList.remove('hide');
    $('chat').classList.remove('show');
    curChatId = null;
    curOtherUser = null;
    if (unsubMessages) unsubMessages();
  };
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "/Vibechat/index.html";
    return;
  }

  currentUser = user;

  try {
    await loadMyProfile();
    await setOnlineStatus(true);
    listenToChats();

    init(); // ✅ MOVE HERE

  } catch (e) {
    console.error("Init error:", e);
  }

  console.log("User ready:", user.uid);
});

async function sendImage(file) {
  if (!file || !curChatId || !currentUser) return;

  try {
    const fileRef = ref(storage, `chatImages/${curChatId}/${Date.now()}_${file.name}`);

    // Upload
    await uploadBytes(fileRef, file);

    // Get URL
    const url = await getDownloadURL(fileRef);

    // Save message
    await addDoc(collection(db, "messages", curChatId, "msgs"), {
      img: url,
      sender: currentUser.uid,
      time: Date.now()
    });

    // Update chat preview
    await setDoc(doc(db, "chats", curChatId), {
      lastMsg: "📷 Photo",
      updatedAt: Date.now()
    }, { merge: true });

  } catch (e) {
    console.error("Image upload error:", e);
    toast("Image failed ❌");
  }
}
if ($('svSave')) {
  $('svSave').onclick = async () => {
    if (!currentUser) return;

    const data = {
      name: $('svName').value,
      username: $('svUsername').value,
      handle: $('svHandle').value,
      ini: $('svIni').value || "U",
      role: $('svRole').value,
      bio: $('svBio').value,
      desc: $('svDesc').value
    };

    await setDoc(doc(db, "users", currentUser.uid), data, { merge: true });
    toast("Profile updated ✅");
  };
}

if ($('uidInput')) {
  $('uidInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') connectByUID();
  });
}
window.copyUID = function() {
  const uid = $('pfUid')?.textContent;
  if (!uid) return;
  navigator.clipboard.writeText(uid);
  toast("UID copied ✅");
};

window.regenUID = function() {
  const newUID = genUID();
  $('svUidBadge').textContent = newUID;
};
window.triggerAvatarEdit = function() {
  toast("Avatar edit coming soon 🚀");
};
async function uploadProfileImage(file) {
  const user = auth.currentUser;

  const imageRef = ref(storage, `profileImages/${user.uid}`);

  await uploadBytes(imageRef, file);

  const url = await getDownloadURL(imageRef);

  await updateDoc(doc(db, "users", user.uid), {
    photoURL: url
  });
}

</script>
