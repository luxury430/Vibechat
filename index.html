<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Access</title>
    <style>
        /* CSS Variables for a Luxury Aesthetic */
        :root {
            --mystery-black: #0a0a0a;
            --rose-gold: #b76e79;
            --rose-gold-hover: #c88791;
            --text-light: #f4f4f4;
            --glass-bg: rgba(20, 20, 20, 0.65);
            --glass-border: rgba(183, 110, 121, 0.3);
            --transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--mystery-black);
            color: var(--text-light);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Hero Banner Section */
        .hero-section {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: space-around;
            flex-wrap: wrap;
            padding: 20px;
            background-image: url('https://images.unsplash.com/photo-1603584173870-7f23fdae1b7a?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10, 10, 10, 0.3), var(--mystery-black));
            z-index: 1;
        }

        .hero-text {
            position: relative;
            z-index: 2;
            max-width: 600px;
            padding: 20px;
            text-align: left;
        }

        .hero-text h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .hero-text span {
            color: var(--rose-gold);
            font-weight: 600;
        }

        .hero-text p {
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: 300;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        /* Premium Glassmorphism Auth Card */
        .auth-container {
            position: relative;
            z-index: 9999;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: clamp(20px, 5vw, 40px);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
            margin: 20px 0;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px 0;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            transition: var(--transition);
            letter-spacing: 1px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .tab.active {
            color: var(--rose-gold);
            border-bottom: 2px solid var(--rose-gold);
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.6s ease forwards;
        }

        /* Inputs */
        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:focus {
            border-color: var(--rose-gold);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-group label {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            pointer-events: none;
            transition: var(--transition);
            font-size: 1rem;
        }

        .input-group input:focus ~ label,
        .input-group input:valid ~ label {
            top: -10px;
            left: 15px;
            font-size: 0.8rem;
            color: var(--rose-gold);
            background: var(--mystery-black);
            padding: 0 5px;
            border-radius: 4px;
        }

        /* Password Strength Meter */
        .password-strength {
            margin-top: -18px;
            margin-bottom: 18px;
        }

        .strength-bar {
            height: 3px;
            border-radius: 2px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            border-radius: 2px;
            transition: width 0.4s ease, background 0.4s ease;
        }

        .strength-text {
            font-size: 0.75rem;
            margin-top: 5px;
            letter-spacing: 0.5px;
            opacity: 0.8;
            min-height: 14px;
        }

        /* Buttons */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--rose-gold);
            color: var(--mystery-black);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-submit:hover {
            background: var(--rose-gold-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(183, 110, 121, 0.3);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Social Login */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 30px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider:not(:empty)::before { margin-right: .25em; }
        .divider:not(:empty)::after { margin-left: .25em; }

        .social-logins {
            display: flex;
            gap: 15px;
        }

        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-social:hover {
            background: none;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(183, 110, 121, 0.3);
        }

        /* --- PREMIUM TOAST NOTIFICATIONS --- */
        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            max-width: 360px;
            width: calc(100% - 40px);
        }

        .toast {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: var(--text-light);
            padding: 16px 24px;
            border-radius: 8px;
            font-size: 0.95rem;
            line-height: 1.5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transform: translateX(120%);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .toast.show {
            transform: translateX(0);
            opacity: 1;
        }

        .toast.error {
            border-left: 4px solid #ef4444;
        }

        .toast.success {
            border-left: 4px solid var(--rose-gold);
        }

        /* --- Responsiveness Adjustments --- */
        @media (max-width: 768px) {
            .hero-section {
                flex-direction: column;
                justify-content: center;
                text-align: center;
                padding-top: 60px;
            }

            .hero-text {
                text-align: center;
                margin-bottom: 20px;
            }

            .social-logins {
                flex-direction: column;
            }
        }

        /* Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s ease-out, transform 1s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .fade-up.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .delay-1 { transition-delay: 0.2s; }
        .delay-2 { transition-delay: 0.4s; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to   { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <!-- Toast Notification Container -->
    <div id="toast-container"></div>

    <section class="hero-section">
        <div class="hero-overlay"></div>

        <div class="hero-text fade-up delay-1">
            <h1>Neuro<span>Forge</span></h1>
            <p>Enter the realm of uncompromising excellence.</p>
        </div>

        <div class="auth-container fade-up delay-2">

            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="tab active" onclick="switchTab('login', this)">Login Account</div>
                <div class="tab" onclick="switchTab('signup', this)">Create Account</div>
            </div>

            <!-- LOGIN FORM -->
            <form id="login" class="form-section active">
                <div class="input-group">
                    <input type="email" id="loginEmail" required>
                    <label>Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="loginPassword" required>
                    <label>Password</label>
                </div>

                <button type="submit" class="btn-submit">Access Portal</button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup" class="form-section">
                <div class="input-group">
                    <input type="text" id="signupName" required>
                    <label>Full Name</label>
                </div>

                <div class="input-group">
                    <input type="email" id="signupEmail" required>
                    <label>Email Address</label>
                </div>

                <div class="input-group">
                    <input type="password" id="signupPassword" required autocomplete="new-password">
                    <label>Create Password</label>
                </div>

                <!-- Live Password Strength Meter -->
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <div class="strength-text" id="strengthText"></div>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="divider">OR CONTINUE WITH</div>

            <div class="social-logins">
                <button class="btn-social">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Google
                </button>
                <button class="btn-social">
                    <svg width="20" height="20" viewBox="0 0 24 24">
                        <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    Facebook
                </button>
            </div>
        </div>
    </section>

    <script>
        /* ===== TAB SWITCHER (single definition) ===== */
        function switchTab(tabId, el) {
            document.querySelectorAll(".form-section").forEach(s => s.classList.remove("active"));
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            document.getElementById(tabId).classList.add("active");
            el.classList.add("active");
        }

        /* ===== FADE-IN ON LOAD ===== */
        document.addEventListener("DOMContentLoaded", () => {
            document.querySelectorAll('.fade-up').forEach(el => {
                setTimeout(() => el.classList.add('visible'), 100);
            });
        });

        /* ===== LIVE PASSWORD STRENGTH METER ===== */
        document.getElementById("signupPassword")?.addEventListener("input", function () {
            const val  = this.value;
            const fill = document.getElementById("strengthFill");
            const text = document.getElementById("strengthText");

            let width, color, label;
            if (!val.length)         { width = "0%";   color = "transparent";      label = ""; }
            else if (val.length < 4) { width = "25%";  color = "#ef4444";          label = "Too short"; }
            else if (val.length < 6) { width = "50%";  color = "#f97316";          label = "Almost there"; }
            else if (val.length < 8) { width = "75%";  color = "#eab308";          label = "Good ✓"; }
            else                     { width = "100%"; color = "var(--rose-gold)"; label = "Strong ✓"; }

            fill.style.width      = width;
            fill.style.background = color;
            text.style.color      = color;
            text.textContent      = label;
        });
    </script>

    <script type="module" src="login.js"></script>
</body>
</html>
